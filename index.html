<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Quest - Advance Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none;
        }
        .instruction {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: white; font-weight: bold; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Voxel Quest</h1>
        <p>仲間: <span id="allyCount">1</span> | 進行距離: <span id="distance">0</span>m</p>
    </div>
    <div class="instruction">タップで仲間を召喚 ＆ 全員で前進！</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(5, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // Ground (Extremely long for progression)
        const floorGeo = new THREE.PlaneGeometry(50, 2000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.z = -900; 
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Character Class ---
        class Character {
            constructor(color, x, z, isEnemy = false) {
                this.group = new THREE.Group();
                this.isEnemy = isEnemy;
                this.speed = isEnemy ? 0.04 : 0.06;
                this.hp = 100;
                this.baseY = 0.5;

                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(1, 1, 1),
                    new THREE.MeshStandardMaterial({ color: color })
                );
                body.position.y = this.baseY;
                body.castShadow = true;
                this.group.add(body);

                // Simple Face
                const eye = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0x000000}));
                eye.position.set(-0.2, 0.7, 0.5);
                this.group.add(eye);
                const eyeR = eye.clone(); eyeR.position.x = 0.2;
                this.group.add(eyeR);

                this.group.position.set(x, 0, z);
                scene.add(this.group);
            }

            update(targets, isIdleAdvance = false) {
                let targetFound = false;
                if (targets.length > 0) {
                    let closest = null;
                    let minDist = Infinity;
                    targets.forEach(t => {
                        const d = this.group.position.distanceTo(t.group.position);
                        if (d < minDist) { minDist = d; closest = t; }
                    });

                    if (closest && minDist < 15) { // Detection range
                        targetFound = true;
                        this.group.lookAt(closest.group.position);
                        if (minDist > 1.2) {
                            this.group.translateZ(this.speed);
                        } else {
                            closest.hp -= 1; // Attack
                            this.group.position.y = Math.abs(Math.sin(Date.now() * 0.02)) * 0.5;
                        }
                    }
                }

                // If no enemies nearby, move forward (Advance Mode)
                if (!targetFound && !this.isEnemy && isIdleAdvance) {
                    this.group.rotation.y = Math.PI; // Face forward (-Z direction)
                    this.group.position.z -= this.speed;
                    this.group.position.y = Math.abs(Math.sin(Date.now() * 0.01)) * 0.2;
                }
            }
        }

        const allies = [new Character(0xFFD700, 0, 0)];
        const enemies = [];
        let distanceTraveled = 0;

        // Spawn Enemies further ahead
        function spawnWave() {
            const leadZ = allies.length > 0 ? allies[0].group.position.z : 0;
            for(let i=0; i<3; i++) {
                enemies.push(new Character(0xFF4500, (Math.random()-0.5)*10, leadZ - 20 - (Math.random()*10), true));
            }
        }
        setInterval(() => { if(enemies.length < 2) spawnWave(); }, 4000);

        // Click to add and "Push"
        window.addEventListener('mousedown', () => {
            const leadZ = allies[0].group.position.z;
            allies.push(new Character(Math.random() * 0xffffff, (Math.random()-0.5)*5, leadZ + 2));
