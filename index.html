<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Quest - Auto Start</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10;
        }
        .instruction {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: white; font-weight: bold; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="margin:0;">Voxel Quest</h1>
        <p>仲間: <span id="allyCount">1</span> | 距離: <span id="distance">0</span>m</p>
    </div>
    <div class="instruction">画面をタップして仲間を増やす！</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- シーン設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ライト
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        // 無限に続くように見える地面
        const floorGeo = new THREE.PlaneGeometry(50, 5000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.z = -2400; 
        floor.receiveShadow = true;
        scene.add(floor);

        // --- キャラクタークラス ---
        class Character {
            constructor(color, x, z, isEnemy = false) {
                this.group = new THREE.Group();
                this.isEnemy = isEnemy;
                this.speed = isEnemy ? 0.05 : 0.08; // 味方の方が少し速い
                this.hp = 100;

                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(1, 1, 1),
                    new THREE.MeshStandardMaterial({ color: color })
                );
                body.position.y = 0.5;
                body.castShadow = true;
                this.group.add(body);

                // 顔（前を向かせる）
                const eyeGeo = new THREE.BoxGeometry(0.2, 0.2, 0.1);
                const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                eyeL.position.set(-0.2, 0.7, 0.5);
                const eyeR = eyeL.clone();
                eyeR.position.x = 0.2;
                this.group.add(eyeL, eyeR);

                this.group.position.set(x, 0, z);
                scene.add(this.group);
            }

            update(targets) {
                if (this.hp <= 0) return;

                let target = null;
                let minDist = 15; // 索敵範囲

                targets.forEach(t => {
                    const d = this.group.position.distanceTo(t.group.position);
                    if (d < minDist) {
                        minDist = d;
                        target = t;
                    }
                });

                if (target) {
                    // 敵がいれば戦う
                    this.group.lookAt(target.group.position);
                    if (minDist > 1.2) {
                        this.group.translateZ(this.speed);
                    } else {
                        target.hp -= 2;
                        this.group.position.y = Math.abs(Math.sin(Date.now() * 0.02)) * 0.5;
                    }
                } else {
                    // 敵がいなければ前進（味方のみ）
                    if (!this.isEnemy) {
                        this.group.rotation.y = Math.PI; // 奥へ向く
                        this.group.position.z -= this.speed;
                        this.group.position.y = Math.abs(Math.sin(Date.now() * 0.01)) * 0.2;
                    }
                }
            }
        }

        const allies = [];
        const enemies = [];

        // 最初の味方
        allies.push(new Character(0xFFD700, 0, 0));

        // 敵のスポーン（進行度に合わせて出現）
        function spawnEnemy() {
            const leaderZ = allies.length > 0 ? allies[0].group.position.z : 0;
            const x = (Math.random() - 0.5) * 15;
            const z = leaderZ - 30; // 30m先にスポーン
            enemies.push(new Character(0xFF4500, x, z, true));
        }

        setInterval(() => {
            if (enemies.length < 5) spawnEnemy();
        }, 2000);

        // --- 入力検知 ---
        const handleAction = () => {
            const leaderZ = allies.length > 0 ? allies[0].group.position.z : 0;
            const colors = [0x00BFFF, 0xFF69B4, 0x32CD32, 0xFFFFFF];
            const randColor = colors[Math.floor(Math.random() * colors.length)];
            allies.push(new Character(randColor, (Math.random()-0.5)*5, leaderZ + 2));
            document.getElementById('allyCount').innerText = allies.length;
        };

        window.addEventListener('mousedown', handleAction);
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleAction();
        }, { passive: false });

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            allies.forEach((a, i) => {
                a.update(enemies);
                if (a.hp <= 0) {
                    scene.remove(a.group);
                    allies.splice(i, 1);
                }
            });

            enemies.forEach((e, i) => {
                e.update(allies);
                if (e.hp <= 0) {
                    scene.remove(e.group);
                    enemies.splice(i, 1);
                }
            });

            // カメラが味方を追いかける
            if (allies.length > 0) {
                const leader = allies[0].group.position;
                camera.position.set(leader.x, 12, leader.z + 15);
                camera.lookAt(leader.x, 0, leader.z - 5);
                
                document.getElementById('distance').innerText = Math.floor(Math.abs(leader.z));
            }

            renderer.render(scene, camera);
        }

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
