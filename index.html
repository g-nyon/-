<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Quest - Skill Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10;
        }
        .instruction {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: white; font-weight: bold; text-shadow: 1px 1px 2px black;
        }
        #controls {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            display: grid; grid-template-areas: ". up ." "left down right";
            gap: 10px; opacity: 0.8;
        }
        .control-btn {
            background: rgba(0,0,0,0.6); color: white; border: 2px solid white;
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
            font-size: 1.5em; border-radius: 10px; user-select: none; cursor: pointer;
        }
        #skill-btn {
            position: absolute; bottom: 80px; right: 30px; width: 70px; height: 70px;
            background: rgba(255, 69, 0, 0.8); color: white; border: 2px solid gold;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; z-index: 11;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="margin:0;">Voxel Quest</h1>
        <p>仲間: <span id="allyCount">0</span> | 距離: <span id="distance">0</span>m</p>
        <p>HP: <span id="playerHp">100</span> | スキル: SPACEキー</p>
    </div>
    
    <div id="skill-btn">技</div>

    <div id="controls">
        <div class="control-btn" style="grid-area: up;" id="btn-up">↑</div>
        <div class="control-btn" style="grid-area: left;" id="btn-left">←</div>
        <div class="control-btn" style="grid-area: down;" id="btn-down">↓</div>
        <div class="control-btn" style="grid-area: right;" id="btn-right">→</div>
    </div>

    <div class="instruction">WASD/矢印で移動 | SPACEで技！ | クリックで召喚</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(10, 20, 10);
        sunLight.castShadow = true;
        scene.add(sunLight);

        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(50, 5000), floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.z = -2400;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- 入力管理 ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- キャラクター共通クラス ---
        class BaseChar {
            constructor(color, x, z) {
                this.mesh = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color }));
                body.castShadow = true;
                body.position.y = 0.5;
                this.mesh.add(body);
                this.body = body;
                this.mesh.position.set(x, 0, z);
                scene.add(this.mesh);
                this.hp = 100;
                this.isDead = false;
            }
        }

        // --- プレイヤー ---
        class Player extends BaseChar {
            constructor() {
                super(0x00BFFF, 0, 0);
                this.skillActive = false;
                this.skillTimer = 0;
            }
            update() {
                let dx = 0, dz = 0;
                if (keys['KeyW'] || keys['ArrowUp']) dz -= 0.15;
                if (keys['KeyS'] || keys['ArrowDown']) dz += 0.15;
                if (keys['KeyA'] || keys['ArrowLeft']) dx -= 0.15;
                if (keys['KeyD'] || keys['ArrowRight']) dx += 0.15;

                this.mesh.position.x += dx;
                this.mesh.position.z += dz;
                if (dx !== 0 || dz !== 0) {
                    this.mesh.rotation.y = Math.atan2(dx, dz);
                    this.body.position.y = 0.5 + Math.abs(Math.sin(Date.now() * 0.01)) * 0.2;
                }

                if ((keys['Space']) && !this.skillActive) this.activateSkill();

                if (this.skillActive) {
                    this.skillTimer--;
                    this.mesh.rotation.y += 0.5; // 高速回転
                    this.body.scale.set(1.5, 1.5, 1.5);
                    if (this.skillTimer <= 0) {
                        this.skillActive = false;
                        this.body.scale.set(1, 1, 1);
                    }
                }
            }
            activateSkill() {
                this.skillActive = true;
                this.skillTimer = 40;
            }
        }

        const player = new Player();
        const allies = [];
        const enemies = [];

        // --- 仲間と敵の更新ロジック ---
        function updateAllies() {
            allies.forEach((a, i) => {
                let target = null;
                let minDist = 10;
                enemies.forEach(e => {
                    const d = a.mesh.position.distanceTo(e.mesh.position);
                    if (d < minDist) { minDist = d; target = e; }
                });

                if (target) {
                    a.mesh.lookAt(target.mesh.position);
                    if (minDist > 1.2) a.mesh.translateZ(0.1);
                    else target.hp -= 2;
                } else {
                    const dToP = a.mesh.position.distanceTo(player.mesh.position);
                    if (dToP > 3) {
                        a.mesh.lookAt(player.mesh.position);
                        a.mesh.translateZ(0.12);
                    }
                }
                if (a.hp <= 0) { scene.remove(a.mesh); allies.splice(i, 1); }
            });
        }

        function updateEnemies() {
            enemies.forEach((e, i) => {
                const dToP = e.mesh.position.distanceTo(player.mesh.position);
                if (player.skillActive && dToP < 3) { e.hp -= 10; e.mesh.position.z -= 1; } // スキル跳ね返し
                
                const targets = [player, ...allies];
                let closest = player;
                let minDist = dToP;
                allies.forEach(a => {
                    const d = e.mesh.position.distanceTo(a.mesh.position);
                    if (d < minDist) { minDist = d; closest = a; }
                });

                e.mesh.lookAt(closest.mesh.position);
                if (minDist > 1.2) e.mesh.translateZ(0.05);
                else closest.hp -= 0.5;

                if (e.hp <= 0) { scene.remove(e.mesh); enemies.splice(i, 1); }
            });
        }

        // --- スポーンとイベント ---
        setInterval(() => {
            if (enemies.length < 5) {
                const x = player.mesh.position.x + (Math.random()-0.5)*20;
                const z = player.mesh.position.z - 30;
                enemies.push(new BaseChar(0xFF4500, x, z));
            }
        }, 2000);

        const spawnAlly = () => {
            const a = new BaseChar(Math.random()*0xffffff, player.mesh.position.x, player.mesh.position.z + 2);
            allies.push(a);
            document.getElementById('allyCount').innerText = allies.length;
        };
        window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'DIV') spawnAlly(); });
        document.getElementById('skill-btn').addEventListener('click', () => player.activateSkill());

        // スマホボタン
        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            el.addEventListener('touchend', () => keys[key] = false);
        };
        setupBtn('btn-up', 'KeyW'); setupBtn('btn-down', 'KeyS'); setupBtn('btn-left', 'KeyA'); setupBtn('btn-right', 'KeyD');

        function animate() {
            requestAnimationFrame(animate);
            player.update();
            updateAllies();
            updateEnemies();

            camera.position.set(player.mesh.position.x, 15, player.mesh.position.z + 15);
            camera.lookAt(player.mesh.position);
            
            document.getElementById('playerHp').innerText = Math.max(0, Math.floor(player.hp));
            document.getElementById('distance').innerText = Math.floor(Math.abs(player.mesh.position.z));
            
            // 背景変化
            const p = (Math.abs(player.mesh.position.z) % 1000) / 1000;
            scene.background.setHSL(0.6, 0.5, 0.5 + Math.sin(p * Math.PI) * 0.2);
            floorMat.color.setHSL(0.3, 0.5, 0.4 + Math.sin(p * Math.PI) * 0.1);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
