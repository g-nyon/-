<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaku-Koro Quest: Object & Skill Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial Black', sans-serif; user-select: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        #cooking-ui { position: absolute; top: 15px; right: 15px; text-align: center; z-index: 20; }
        #pot-btn { width: 70px; height: 70px; background: #eee; border: 4px solid #555; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px #999; }
        #pot-btn:active { transform: translateY(2px); box-shadow: none; }
        #cook-bar-bg { width: 70px; height: 8px; background: #444; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        #cook-bar { width: 0%; height: 100%; background: #ff9800; }
        #skill-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 20; }
        .skill-slot { width: 65px; height: 65px; border: 3px solid #fff; border-radius: 10px; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; font-size: 8px; cursor: pointer; position: relative; }
        .cd-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); height: 0%; border-radius: 0 0 7px 7px; pointer-events: none; }
        #msg { position: absolute; top: 30%; width: 100%; text-align: center; color: #ffeb3b; font-size: 40px; display: none; text-shadow: 0 0 10px #000; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color: #ffcb05;">KAKU-KORO DX</h2>
        <p>距離: <span id="dist">0</span>m | 仲間: <span id="team-size">3</span></p>
        <progress id="hp-bar" value="100" max="100" style="width:200px; height: 15px;"></progress>
    </div>

    <div id="cooking-ui">
        <div id="pot-btn" onclick="tryCook()">🍲</div>
        <div id="cook-bar-bg"><div id="cook-bar"></div></div>
    </div>

    <div id="msg"></div>

    <div id="skill-bar">
        <div class="skill-slot" onclick="cast(1)" style="background:#fcd116;">10万ボルト<br>(Q)<div class="cd-overlay" id="cd1"></div></div>
        <div class="skill-slot" onclick="cast(2)" style="background:#7ac74c;">カッター<br>(E)<div class="cd-overlay" id="cd2"></div></div>
        <div class="skill-slot" onclick="cast(3)" style="background:#6390f0;">バブル<br>(R)<div class="cd-overlay" id="cd3"></div></div>
        <div class="skill-slot" onclick="cast(4)" style="background:#ee8130;">火炎放射<br>(F)<div class="cd-overlay" id="cd4"></div></div>
        <div class="skill-slot" onclick="cast(5)" style="background:#a33ea1;">はかい光線<br>(Space)<div class="cd-overlay" id="cd5"></div></div>
    </div>

    <script>
        window.onload = () => {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa2e0a4);
            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(30, 60, 20);
            sun.castShadow = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.7), sun);

            // Ground
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 10000), new THREE.MeshStandardMaterial({color: 0x81c784}));
            floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
            scene.add(floor);

            // Objects Group
            const objects = [];
            function spawnEnvObject(z) {
                const group = new THREE.Group();
                const isTree = Math.random() > 0.4;
                if(isTree) {
                    const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.5, 0.8), new THREE.MeshStandardMaterial({color: 0x6d4c41}));
                    const leaf = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.2, 2.2), new THREE.MeshStandardMaterial({color: 0x43a047}));
                    leaf.position.y = 1.8; group.add(trunk, leaf);
                } else {
                    const rock = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 1.5), new THREE.MeshStandardMaterial({color: 0x9e9e9e}));
                    group.add(rock);
                }
                group.position.set((Math.random()-0.5)*40, 0.5, z);
                scene.add(group);
                objects.push(group);
            }

            // Entity class
            class Entity {
                constructor(role, x, z, color, isShiny = false) {
                    this.role = role;
                    this.isShiny = isShiny;
                    this.mesh = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color}));
                    body.castShadow = true; body.position.y = 0.6;
                    this.mesh.add(body);
                    
                    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0x222222}));
                    eye.position.set(-0.3, 0.8, 0.6);
                    const eyeR = eye.clone(); eyeR.position.x = 0.3;
                    this.mesh.add(eye, eyeR);

                    this.mesh.position.set(x, 0, z);
                    scene.add(this.mesh);
                    this.hp = role === 'boss' ? 2500 : 150;
                    this.maxHp = this.hp;
                    this.knockback = new THREE.Vector3();
                    this.autoTimer = Math.random() * 60;
                    this.dead = false;
                }
                update() {
                    this.mesh.position.add(this.knockback);
                    this.knockback.multiplyScalar(0.85);
                    this.mesh.position.y = Math.abs(Math.sin(Date.now()*0.01)) * 0.3;
                    if(this.isShiny && Math.random() < 0.2) createFx(this.mesh.position, 0xffff00, 1, 0.3, true);
                    
                    this.autoTimer++;
                    if(this.autoTimer > 100) { this.autoAttack(); this.autoTimer = 0; }
                }
                autoAttack() {
                    const targets = (this.role === 'enemy' || this.role === 'boss') ? [player, ...allies] : enemies;
                    targets.forEach(t => {
                        if(!t.dead && t.mesh.position.distanceTo(this.mesh.position) < 10) {
                            fireProjectile(this.mesh.position, t.mesh.position, 0xffffff, 5);
                        }
                    });
                }
                takeDamage(dmg, from) {
                    this.hp -= dmg;
                    const dir = new THREE.Vector3().subVectors(this.mesh.position, from).normalize().multiplyScalar(1.2);
                    this.knockback.add(dir);
                    if(this.hp <= 0 && !this.dead) { this.dead = true; scene.remove(this.mesh); }
                }
            }

            const player = new Entity('player', 0, 0, 0xffeb3b);
            const allies = [new Entity('ally', -2, 2, 0x81d4fa), new Entity('ally', 2, 2, 0xffab91)];
            const enemies = [];
            const projectiles = [];
            const particles = [];
            const keys = {};
            let cooldowns = [0, 0, 0, 0, 0];
            let cookValue = 0;

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                // 即時技発動
                if(e.code === 'KeyQ') cast(1);
                if(e.code === 'KeyE') cast(2);
                if(e.code === 'KeyR') cast(3);
                if(e.code === 'KeyF') cast(4);
                if(e.code === 'Space') cast(5);
            });
            window.addEventListener('keyup', e => keys[e.code] = false);

            window.tryCook = () => {
                if(cookValue < 100) return;
                cookValue = 0;
                const shiny = Math.random() < 0.2;
                const c = shiny ? 0xffffff : [0x81d4fa, 0xffab91, 0xce93d8][Math.floor(Math.random()*3)];
                allies.push(new Entity('ally', player.mesh.position.x, player.mesh.position.z+3, c, shiny));
                document.getElementById('team-size').innerText = allies.length + 1;
                showMsg(shiny ? "✨ SHINY POKEMON! ✨" : "NEW ALLY!");
            };

            function showMsg(t) {
                const m = document.getElementById('msg'); m.innerText = t; m.style.display = 'block';
                setTimeout(() => m.style.display = 'none', 2000);
            }

            window.cast = (id) => {
                if(cooldowns[id-1] > 0) return;
                cooldowns[id-1] = [60, 60, 90, 110, 250][id-1];
                const pPos = player.mesh.position;
                if(id === 1) { // 10万ボルト
                    createFx(pPos, 0xffff00, 20);
                    enemies.forEach(e => { if(e.mesh.position.distanceTo(pPos) < 10) e.takeDamage(60, pPos); });
                } else if(id === 2) { // 前方カッター
                    const target = pPos.clone().add(new THREE.Vector3(0,0,-20).applyQuaternion(player.mesh.quaternion));
                    fireProjectile(pPos, target, 0x7ac74c, 40);
                } else if(id === 3) { // 3方向
                    [-0.5, 0, 0.5].forEach(a => {
                        const target = pPos.clone().add(new THREE.Vector3(Math.sin(a),0,Math.cos(a)).multiplyScalar(-20).applyQuaternion(player.mesh.quaternion));
                        fireProjectile(pPos, target, 0x6390f0, 30);
                    });
                } else if(id === 4) { // 火炎放射
                    let c = 0; const tm = setInterval(() => {
                        const target = pPos.clone().add(new THREE.Vector3((Math.random()-0.5)*5,0,-15).applyQuaternion(player.mesh.quaternion));
                        fireProjectile(player.mesh.position, target, 0xff5722, 15);
                        if(++c > 10) clearInterval(tm);
                    }, 60);
                } else if(id === 5) { // はかいこうせん
                    const beam = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 40), new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.7}));
                    beam.position.copy(pPos); beam.quaternion.copy(player.mesh.quaternion); beam.translateZ(-20);
                    scene.add(beam); setTimeout(() => scene.remove(beam), 500);
                    enemies.forEach(e => { if(e.mesh.position.distanceTo(pPos) < 40) e.takeDamage(200, pPos); });
                }
            };

            function fireProjectile(from, to, color, dmg) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshBasicMaterial({color}));
                p.position.copy(from);
                const dir = new THREE.Vector3().subVectors(to, from).normalize();
                p.userData = { vel: dir.multiplyScalar(0.8), dmg, life: 60 };
                scene.add(p); projectiles.push(p);
            }

            function createFx(pos, color, count, size=0.4, isStar=false) {
                for(let i=0; i<count; i++) {
                    const p = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), new THREE.MeshBasicMaterial({color}));
                    p.position.set(pos.x+(Math.random()-0.5)*2, pos.y+1, pos.z+(Math.random()-0.5)*2);
                    p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.2, 0.1+Math.random()*0.2, (Math.random()-0.5)*0.2), life: isStar ? 40 : 20 };
                    scene.add(p); particles.push(p);
                }
            }

            // Main Loop
            function animate() {
                requestAnimationFrame(animate);

                let move = new THREE.Vector3();
                if(keys['KeyW'] || keys['ArrowUp']) move.z -= 1;
                if(keys['KeyS'] || keys['ArrowDown']) move.z += 1;
                if(keys['KeyA'] || keys['ArrowLeft']) move.x -= 1;
                if(keys['KeyD'] || keys['ArrowRight']) move.x += 1;

                if(move.length() > 0) {
                    move.normalize(); player.mesh.position.addScaledVector(move, 0.25);
                    player.mesh.rotation.y = Math.atan2(move.x, move.z);
                    cookValue = Math.min(100, cookValue + 0.15);
                }
                player.update();

                // Ally AI: 前方へ
                const nearest = enemies.length > 0 ? enemies[0] : null;
                allies.forEach(a => {
                    a.update();
                    if(nearest && nearest.mesh.position.distanceTo(player.mesh.position) < 20) {
                        const targetPos = nearest.mesh.position.clone().lerp(player.mesh.position, 0.5);
                        a.mesh.lookAt(targetPos);
                        if(a.mesh.position.distanceTo(targetPos) > 2) a.mesh.translateZ(0.28);
                    } else {
                        if(a.mesh.position.distanceTo(player.mesh.position) > 5) {
                            a.mesh.lookAt(player.mesh.position); a.mesh.translateZ(0.24);
                        }
                    }
                });

                // Spawn logic (Enemies & Env)
                if(enemies.length < 6 && Math.random() < 0.03) {
                    enemies.push(new Entity('enemy', (Math.random()-0.5)*40, player.mesh.position.z - 70, 0xef5350));
                }
                if(Math.random() < 0.05) spawnEnvObject(player.mesh.position.z - 80);

                // Cleaning
                [enemies, objects].forEach(list => {
                    for(let i=list.length-1; i>=0; i--) {
                        const item = list[i];
                        const pos = item instanceof Entity ? item.mesh.position : item.position;
                        if(pos.z > player.mesh.position.z + 40 || (item.dead)) {
                            scene.remove(item instanceof Entity ? item.mesh : item);
                            list.splice(i, 1);
                        }
                    }
                });
                enemies.forEach(e => {
                    e.update(); e.mesh.lookAt(player.mesh.position); e.mesh.translateZ(0.08);
                    if(e.mesh.position.distanceTo(player.mesh.position) < 1.5) player.hp -= 0.3;
                });

                // Projectiles & Particles
                projectiles.forEach((p, i) => {
                    p.position.add(p.userData.vel); p.userData.life--;
                    enemies.forEach(e => { if(e.mesh.position.distanceTo(p.position) < 2) { e.takeDamage(p.userData.dmg, p.position); p.userData.life=0; } });
                    if(p.userData.life <= 0) { scene.remove(p); projectiles.splice(i, 1); }
                });
                for(let i=particles.length-1; i>=0; i--) {
                    const p = particles[i]; p.position.add(p.userData.vel); p.userData.life--;
                    if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
                }

                // UI
                document.getElementById('dist').innerText = Math.floor(Math.abs(player.mesh.position.z));
                document.getElementById('hp-bar').value = player.hp;
                document.getElementById('cook-bar').style.width = cookValue + '%';
                cooldowns = cooldowns.map((v, i) => {
                    const nv = Math.max(0, v - 1);
                    document.getElementById(`cd${i+1}`).style.height = (nv / [60,60,90,110,250][i] * 100) + '%';
                    return nv;
                });

                camera.position.set(player.mesh.position.x, 25, player.mesh.position.z + 28);
                camera.lookAt(player.mesh.position);
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
