<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeVoxel Quest Ultra</title>
    <style>
        body { margin: 0; overflow: hidden; background: #444; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            text-shadow: 2px 2px black; pointer-events: none; z-index: 10;
        }
        .skill-container {
            position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px;
        }
        .skill-btn {
            width: 60px; height: 60px; border-radius: 10px; border: 3px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: bold; cursor: pointer; font-size: 10px;
        }
        #skill1 { background: #f08030; } /* 炎 */
        #skill2 { background: #78c850; } /* 草 */
        #skill3 { background: #6890f0; } /* 水 */
        
        #boss-warning {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: red; font-size: 50px; font-weight: bold; display: none; text-shadow: 3px 3px black;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0;">POKE VOXEL</h2>
        <p>距離: <span id="distance">0</span>m | 仲間: <span id="allyCount">0</span></p>
        <p>HP: <progress id="hp-bar" value="100" max="100" style="width:200px;"></progress></p>
    </div>

    <div id="boss-warning">WARNING: BOSS APPEARED!</div>

    <div class="skill-container">
        <div class="skill-btn" id="skill1">たいあたり<br>(Q)</div>
        <div class="skill-btn" id="skill2 { background: #78c850; }">はっぱカッター<br>(E)</div>
        <div class="skill-btn" id="skill3 { background: #c03028; }">だいもんじ<br>(R)</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 初期設定 ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.6));

        // 地面 (テクスチャ風グリッド)
        const floorGeo = new THREE.PlaneGeometry(60, 5000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // グリッドヘルパーで模様をつける
        const grid = new THREE.GridHelper(5000, 500, 0x000000, 0x000000);
        grid.rotation.x = -Math.PI / 2;
        grid.position.y = 0.01;
        grid.material.opacity = 0.1;
        grid.material.transparent = true;
        scene.add(grid);

        // --- キャラクター作成関数 ---
        function createVoxelModel(type) {
            const group = new THREE.Group();
            let color = 0xffcc00; // ピカ風
            if(type === 'enemy') color = 0x888888;
            if(type === 'boss') color = 0x440044;

            // 本体
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color }));
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);

            // 耳・模様など（単色以外にする）
            const earGeo = new THREE.BoxGeometry(0.3, 0.5, 0.2);
            const earMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const earL = new THREE.Mesh(earGeo, earMat);
            earL.position.set(-0.3, 1.1, 0);
            group.add(earL);
            const earR = earL.clone(); earR.position.x = 0.3; group.add(earR);

            // 目
            const eye = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0}));
            eye.position.set(-0.2, 0.7, 0.5);
            group.add(eye);
            const eyeR = eye.clone(); eyeR.position.x = 0.2; group.add(eyeR);

            return group;
        }

        class Entity {
            constructor(type, x, z) {
                this.type = type;
                this.model = createVoxelModel(type);
                this.model.position.set(x, 0, z);
                if(type === 'boss') this.model.scale.set(4, 4, 4);
                scene.add(this.model);
                this.hp = type === 'boss' ? 500 : 100;
                this.maxHp = this.hp;
                this.speed = type === 'ally' ? 0.2 : 0.08;
            }
        }

        // --- 状態管理 ---
        const player = new Entity('player', 0, 0);
        const allies = [];
        const enemies = [];
        const keys = {};
        let distCount = 0;
        let isBossBattle = false;

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- スキル処理 ---
        function useSkill(num) {
            if(num === 1) { // 突進
                player.model.translateZ(3);
                enemies.forEach(e => {
                    if(e.model.position.distanceTo(player.model.position) < 3) e.hp -= 40;
                });
            }
            if(num === 2) { // カッター
                for(let i=0; i<8; i++) {
                    const leaf = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.1,0.5), new THREE.MeshStandardMaterial({color: 0x00ff00}));
                    leaf.position.copy(player.model.position);
                    scene.add(leaf);
                    setTimeout(() => scene.remove(leaf), 500);
                }
                enemies.forEach(e => {
                    if(e.model.position.distanceTo(player.model.position) < 6) e.hp -= 20;
                });
            }
            if(num === 3) { // 爆発
                const blast = new THREE.Mesh(new THREE.SphereGeometry(4), new THREE.MeshBasicMaterial({color: 0xff4500, transparent: true, opacity: 0.5}));
                blast.position.copy(player.model.position);
                scene.add(blast);
                setTimeout(() => scene.remove(blast), 300);
                enemies.forEach(e => {
                    if(e.model.position.distanceTo(player.model.position) < 5) e.hp -= 60;
                });
            }
        }

        document.getElementById('skill1').onclick = () => useSkill(1);
        document.getElementById('skill2').onclick = () => useSkill(2);
        document.getElementById('skill3').onclick = () => useSkill(3);

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 移動
            if (keys['KeyW']) player.model.position.z -= 0.2;
            if (keys['KeyS']) player.model.position.z += 0.2;
            if (keys['KeyA']) player.model.position.x -= 0.2;
            if (keys['KeyD']) player.model.position.x += 0.2;
            if (keys['KeyQ']) { useSkill(1); keys['KeyQ'] = false; }
            if (keys['KeyE']) { useSkill(2); keys['KeyE'] = false; }
            if (keys['KeyR']) { useSkill(3); keys['KeyR'] = false; }

            // 仲間追従 (超高速化)
            allies.forEach(a => {
                const dist = a.model.position.distanceTo(player.model.position);
                if(dist > 3) {
                    a.model.lookAt(player.model.position);
                    a.model.translateZ(0.25);
                }
            });

            // 敵AI
            enemies.forEach((e, i) => {
                e.model.lookAt(player.model.position);
                e.model.translateZ(e.speed);
                if(e.model.position.distanceTo(player.model.position) < 1.5) {
                    player.hp -= 0.2;
                }
                if(e.hp <= 0) {
                    scene.remove(e.model);
                    enemies.splice(i, 1);
                    if(e.type === 'boss') {
                        isBossBattle = false;
                        document.getElementById('boss-warning').style.display = 'none';
                    }
                }
            });

            // ボス出現ロジック
            distCount = Math.floor(Math.abs(player.model.position.z));
            if(distCount > 0 && distCount % 300 === 0 && !isBossBattle) {
                isBossBattle = true;
                const boss = new Entity('boss', 0, player.model.position.z - 40);
                enemies.push(boss);
                document.getElementById('boss-warning').style.display = 'block';
            }

            // スポーン
            if(!isBossBattle && enemies.length < 3 && Math.random() < 0.02) {
                enemies.push(new Entity('enemy', (Math.random()-0.5)*20, player.model.position.z - 30));
            }

            // UI & カメラ
            document.getElementById('distance').innerText = distCount;
            document.getElementById('hp-bar').value = player.hp;
            camera.position.set(player.model.position.x, 15, player.model.position.z + 15);
            camera.lookAt(player.model.position);

            // 背景の変化
            const hue = (distCount % 1000) / 1000;
            if(isBossBattle) {
                scene.background = new THREE.Color(0x330000);
            } else {
                scene.background = new THREE.Color().setHSL(hue, 0.4, 0.6);
            }

            renderer.render(scene, camera);
        }

        // クリックで仲間召喚
        window.addEventListener('mousedown', (e) => {
            if(e.target.className !== 'skill-btn') {
                const a = new Entity('ally', player.model.position.x, player.model.position.z + 2);
                allies.push(a);
                document.getElementById('allyCount').innerText = allies.length;
            }
        });

        animate();
    </script>
</body>
</html>
