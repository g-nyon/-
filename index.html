<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaku-Koro Quest: Item Drop Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial Black', sans-serif; user-select: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        #cooking-ui { position: absolute; top: 15px; right: 15px; text-align: center; z-index: 20; }
        #pot-btn { width: 70px; height: 70px; background: #eee; border: 4px solid #555; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px #999; }
        #cook-bar-bg { width: 70px; height: 8px; background: #444; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        #cook-bar { width: 0%; height: 100%; background: #ff9800; transition: width 0.3s; }
        #skill-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 20; }
        .skill-slot { width: 65px; height: 65px; border: 3px solid #fff; border-radius: 10px; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; font-size: 8px; cursor: pointer; position: relative; }
        .cd-overlay { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); height: 0%; border-radius: 0 0 7px 7px; pointer-events: none; }
        #msg { position: absolute; top: 30%; width: 100%; text-align: center; color: #ffeb3b; font-size: 40px; display: none; text-shadow: 0 0 10px #000; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color: #ffcb05;">KAKU-KORO QUEST</h2>
        <p>距離: <span id="dist">0</span>m | 仲間: <span id="team-size">3</span></p>
        <progress id="hp-bar" value="100" max="100" style="width:200px; height: 15px;"></progress>
    </div>

    <div id="cooking-ui">
        <div id="pot-btn" onclick="tryCook()">🍲</div>
        <div id="cook-bar-bg"><div id="cook-bar"></div></div>
    </div>

    <div id="msg"></div>

    <div id="skill-bar">
        <div class="skill-slot" onclick="cast(1)" style="background:#fcd116;">10万ボルト<br>(Q)<div class="cd-overlay" id="cd1"></div></div>
        <div class="skill-slot" onclick="cast(2)" style="background:#7ac74c;">カッター<br>(E)<div class="cd-overlay" id="cd2"></div></div>
        <div class="skill-slot" onclick="cast(3)" style="background:#6390f0;">バブル<br>(R)<div class="cd-overlay" id="cd3"></div></div>
        <div class="skill-slot" onclick="cast(4)" style="background:#ee8130;">火炎放射<br>(F)<div class="cd-overlay" id="cd4"></div></div>
        <div class="skill-slot" onclick="cast(5)" style="background:#a33ea1;">はかい光線<br>(Space)<div class="cd-overlay" id="cd5"></div></div>
    </div>

    <script>
        window.onload = () => {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa2e0a4);
            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(30, 60, 20);
            sun.castShadow = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.7), sun);

            // Ground
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 10000), new THREE.MeshStandardMaterial({color: 0x81c784}));
            floor.rotation.x = -Math.PI/2; floor.receiveShadow = true;
            scene.add(floor);

            const enemies = [];
            const allies = [];
            const projectiles = [];
            const particles = [];
            const items = [];
            const objects = [];
            const keys = {};
            let cooldowns = [0, 0, 0, 0, 0];
            let cookValue = 0;

            // --- 共通エフェクト ---
            function createFx(pos, color, count, size=0.4) {
                for(let i=0; i<count; i++) {
                    const p = new THREE.Mesh(new THREE.BoxGeometry(size, size, size), new THREE.MeshBasicMaterial({color}));
                    p.position.copy(pos);
                    p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.3, 0.2+Math.random()*0.3, (Math.random()-0.5)*0.3), life: 25 };
                    scene.add(p); particles.push(p);
                }
            }

            // --- アイテム(料理素材)クラス ---
            class MaterialItem {
                constructor(x, z) {
                    const colors = [0xff5252, 0x448aff, 0xffeb3b, 0xffffff];
                    this.mesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({color: colors[Math.floor(Math.random()*colors.length)], emissive: 0x333333}));
                    this.mesh.position.set(x, 0.5, z);
                    this.mesh.rotation.set(Math.random(), Math.random(), Math.random());
                    scene.add(this.mesh);
                    this.collected = false;
                }
                update() {
                    this.mesh.rotation.y += 0.05;
                    this.mesh.position.y = 0.5 + Math.sin(Date.now()*0.005) * 0.2;
                    
                    const d = this.mesh.position.distanceTo(player.mesh.position);
                    if(d < 6) { // 引き寄せ
                        const dir = new THREE.Vector3().subVectors(player.mesh.position, this.mesh.position).normalize();
                        this.mesh.position.addScaledVector(dir, 0.4);
                    }
                    if(d < 1.5 && !this.collected) {
                        this.collected = true;
                        cookValue = Math.min(100, cookValue + 15); // アイテムで15%アップ
                        createFx(this.mesh.position, 0xffffff, 10);
                        scene.remove(this.mesh);
                    }
                }
            }

            // --- Entity クラス ---
            class Entity {
                constructor(role, x, z, color, isShiny = false) {
                    this.role = role;
                    this.isShiny = isShiny;
                    this.mesh = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color}));
                    body.castShadow = true; body.position.y = 0.6;
                    this.mesh.add(body);
                    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0x222222}));
                    eye.position.set(-0.3, 0.8, 0.6);
                    const eyeR = eye.clone(); eyeR.position.x = 0.3;
                    this.mesh.add(eye, eyeR);
                    this.mesh.position.set(x, 0, z);
                    scene.add(this.mesh);
                    this.hp = role === 'boss' ? 3000 : 150;
                    this.dead = false;
                    this.knockback = new THREE.Vector3();
                }
                update() {
                    this.mesh.position.add(this.knockback);
                    this.knockback.multiplyScalar(0.8);
                    this.mesh.position.y = Math.abs(Math.sin(Date.now()*0.01)) * 0.3;
                    if(this.isShiny && Math.random() < 0.1) createFx(this.mesh.position, 0xffff00, 1, 0.2);
                }
                takeDamage(dmg, from) {
                    this.hp -= dmg;
                    this.knockback.add(new THREE.Vector3().subVectors(this.mesh.position, from).normalize().multiplyScalar(1.5));
                    if(this.hp <= 0 && !this.dead) {
                        this.dead = true;
                        if(this.role === 'enemy' && Math.random() < 0.6) items.push(new MaterialItem(this.mesh.position.x, this.mesh.position.z));
                        scene.remove(this.mesh);
                    }
                }
            }

            const player = new Entity('player', 0, 0, 0xffeb3b);
            allies.push(new Entity('ally', -2, 2, 0x81d4fa), new Entity('ally', 2, 2, 0xffab91));

            // --- 技の処理 ---
            window.cast = (id) => {
                if(cooldowns[id-1] > 0) return;
                cooldowns[id-1] = [60, 60, 90, 110, 250][id-1];
                
                const pPos = player.mesh.position.clone();
                const forward = new THREE.Vector3(0,0,1).applyQuaternion(player.mesh.quaternion); // 正面ベクトル

                if(id === 1) { // 10万ボルト
                    createFx(pPos, 0xffff00, 25);
                    enemies.forEach(e => { if(e.mesh.position.distanceTo(pPos) < 10) e.takeDamage(60, pPos); });
                } else if(id === 2) { // カッター
                    fire(pPos, forward, 0x7ac74c, 45);
                } else if(id === 3) { // バブル (3方向)
                    [-0.4, 0, 0.4].forEach(angle => {
                        const dir = forward.clone().applyAxisAngle(new THREE.Vector3(0,1,0), angle);
                        fire(pPos, dir, 0x6390f0, 30);
                    });
                } else if(id === 4) { // 火炎放射 (正面に連続)
                    let count = 0;
                    const itv = setInterval(() => {
                        const randDir = forward.clone().applyAxisAngle(new THREE.Vector3(0,1,0), (Math.random()-0.5)*0.4);
                        fire(player.mesh.position, randDir, 0xff5722, 15);
                        if(++count > 12) clearInterval(itv);
                    }, 50);
                } else if(id === 5) { // はかいこうせん
                    const beam = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 40), new THREE.MeshBasicMaterial({color:0xffffff, transparent:true, opacity:0.8}));
                    beam.position.copy(pPos);
                    beam.quaternion.copy(player.mesh.quaternion);
                    beam.translateZ(20); // 正面にずらす
                    scene.add(beam);
                    setTimeout(() => scene.remove(beam), 500);
                    enemies.forEach(e => {
                        const toEnemy = new THREE.Vector3().subVectors(e.mesh.position, pPos);
                        const dist = toEnemy.length();
                        if(dist < 40 && toEnemy.normalize().dot(forward) > 0.95) e.takeDamage(250, pPos);
                    });
                }
            };

            function fire(from, dir, color, dmg) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshBasicMaterial({color}));
                p.position.copy(from).addScaledVector(dir, 1);
                p.userData = { vel: dir.clone().multiplyScalar(0.8), dmg, life: 60 };
                scene.add(p); projectiles.push(p);
            }

            // --- 環境オブジェクト ---
            function spawnEnv(z) {
                const group = new THREE.Group();
                if(Math.random() > 0.4) {
                    const trunk = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0x6d4c41}));
                    const leaf = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), new THREE.MeshStandardMaterial({color: 0x43a047}));
                    leaf.position.y = 2; group.add(trunk, leaf);
                } else {
                    const rock = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 2), new THREE.MeshStandardMaterial({color: 0x9e9e9e}));
                    group.add(rock);
                }
                group.position.set((Math.random()-0.5)*50, 0.5, z);
                scene.add(group); objects.push(group);
            }

            // --- メインループ ---
            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'KeyQ') cast(1); if(e.code === 'KeyE') cast(2);
                if(e.code === 'KeyR') cast(3); if(e.code === 'KeyF') cast(4);
                if(e.code === 'Space') cast(5);
            });
            window.addEventListener('keyup', e => keys[e.code] = false);

            window.tryCook = () => {
                if(cookValue < 100) return;
                cookValue = 0;
                const isShiny = Math.random() < 0.2;
                allies.push(new Entity('ally', player.mesh.position.x, player.mesh.position.z+3, isShiny?0xffffff:0xce93d8, isShiny));
                document.getElementById('team-size').innerText = allies.length + 1;
                const m = document.getElementById('msg'); m.innerText = isShiny ? "✨ SHINY ALLY! ✨" : "NEW ALLY!";
                m.style.display='block'; setTimeout(()=>m.style.display='none', 2000);
            };

            function animate() {
                requestAnimationFrame(animate);

                let move = new THREE.Vector3();
                if(keys['KeyW'] || keys['ArrowUp']) move.z -= 1;
                if(keys['KeyS'] || keys['ArrowDown']) move.z += 1;
                if(keys['KeyA'] || keys['ArrowLeft']) move.x -= 1;
                if(keys['KeyD'] || keys['ArrowRight']) move.x += 1;

                if(move.length() > 0) {
                    move.normalize();
                    player.mesh.position.addScaledVector(move, 0.25);
                    player.mesh.rotation.y = Math.atan2(move.x, move.z);
                    cookValue = Math.min(100, cookValue + 0.05);
                }
                player.update();

                // 味方AI
                allies.forEach(a => {
                    a.update();
                    const dist = a.mesh.position.distanceTo(player.mesh.position);
                    if(dist > 5) {
                        a.mesh.lookAt(player.mesh.position);
                        a.mesh.translateZ(0.24);
                    }
                });

                // スポーン
                if(enemies.length < 6 && Math.random() < 0.03) enemies.push(new Entity('enemy', (Math.random()-0.5)*40, player.mesh.position.z - 70, 0xef5350));
                if(Math.random() < 0.05) spawnEnv(player.mesh.position.z - 80);

                // 更新 & 掃除
                [enemies, items, projectiles, objects].forEach(list => {
                    for(let i=list.length-1; i>=0; i--) {
                        const o = list[i];
                        const pos = o.mesh ? o.mesh.position : o.position;
                        if(o.update) o.update();
                        if(o instanceof Entity) {
                            o.mesh.lookAt(player.mesh.position); o.mesh.translateZ(0.08);
                            if(o.mesh.position.distanceTo(player.mesh.position) < 1.5) player.hp -= 0.2;
                        }
                        if(pos.z > player.mesh.position.z + 40 || o.dead || o.collected || (o.userData && o.userData.life <= 0)) {
                            scene.remove(o.mesh || o);
                            list.splice(i, 1);
                        }
                    }
                });

                // 弾丸判定
                projectiles.forEach(p => {
                    p.position.add(p.userData.vel); p.userData.life--;
                    enemies.forEach(e => { if(e.mesh.position.distanceTo(p.position) < 2) { e.takeDamage(p.userData.dmg, p.position); p.userData.life = 0; } });
                });
                for(let i=particles.length-1; i>=0; i--) {
                    const p = particles[i]; p.position.add(p.userData.vel); p.userData.life--;
                    if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
                }

                // UI
                document.getElementById('dist').innerText = Math.floor(Math.abs(player.mesh.position.z));
                document.getElementById('hp-bar').value = player.hp;
                document.getElementById('cook-bar').style.width = cookValue + '%';
                cooldowns = cooldowns.map((v, i) => {
                    const nv = Math.max(0, v - 1);
                    document.getElementById(`cd${i+1}`).style.height = (nv / [60,60,90,110,250][i] * 100) + '%';
                    return nv;
                });

                camera.position.set(player.mesh.position.x, 25, player.mesh.position.z + 28);
                camera.lookAt(player.mesh.position);
                renderer.render(scene, camera);
            }
            animate();
        };
    </script>
</body>
</html>
