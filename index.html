<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Quest Ultra - Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial', sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            text-shadow: 2px 2px black; pointer-events: none; z-index: 10;
        }
        .skill-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 20;
        }
        .skill-btn {
            width: 70px; height: 70px; border-radius: 15px; border: 3px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: bold; cursor: pointer; font-size: 11px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.1s;
        }
        .skill-btn:active { transform: scale(0.9); }
        #skill1 { background: #f08030; } /* 炎 */
        #skill2 { background: #78c850; } /* 草 */
        #skill3 { background: #c03028; } /* 格闘 */
        
        #boss-warning {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #ff0000; font-size: 40px; font-weight: bold; display: none; 
            text-shadow: 4px 4px black; z-index: 15; text-align: center; width: 100%;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color: #ffcb05; -webkit-text-stroke: 1px #3b4cca;">VOXEL QUEST</h2>
        <p>距離: <span id="distance">0</span>m | 仲間: <span id="allyCount">2</span></p>
        <p>HP: <progress id="hp-bar" value="100" max="100" style="width:200px; height: 20px;"></progress></p>
    </div>

    <div id="boss-warning">⚠️ BOSS WARNING ⚠️</div>

    <div class="skill-container">
        <div class="skill-btn" id="skill1">たいあたり<br>(Q)</div>
        <div class="skill-btn" id="skill2">カッター<br>(E)</div>
        <div class="skill-btn" id="skill3">ばくはつ<br>(R)</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.6));

        // 地面
        const floorGeo = new THREE.PlaneGeometry(60, 5000);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const grid = new THREE.GridHelper(5000, 500, 0x44aa44, 0x44aa44);
        grid.position.y = 0.05;
        scene.add(grid);

        // --- キャラクター作成 ---
        function createCharacter(type, customColor) {
            const group = new THREE.Group();
            let bodyColor = customColor || (type === 'player' ? 0xffcc00 : 0x888888);
            if(type === 'boss') bodyColor = 0x550055;

            // ボディ
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: bodyColor }));
            body.position.y = 0.5;
            body.castShadow = true;
            group.add(body);

            // 耳（ポケモン風）
            const earGeo = new THREE.BoxGeometry(0.3, 0.6, 0.2);
            const earMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const earL = new THREE.Mesh(earGeo, earMat);
            earL.position.set(-0.4, 1.0, 0);
            group.add(earL);
            const earR = earL.clone(); earR.position.x = 0.4; group.add(earR);

            // 目
            const eye = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0x000000}));
            eye.position.set(-0.25, 0.7, 0.5);
            group.add(eye);
            const eyeR = eye.clone(); eyeR.position.x = 0.25; group.add(eyeR);

            return group;
        }

        class Entity {
            constructor(type, x, z, color) {
                this.type = type;
                this.model = createCharacter(type, color);
                this.model.position.set(x, 0, z);
                if(type === 'boss') this.model.scale.set(4, 4, 4);
                scene.add(this.model);
                this.hp = type === 'boss' ? 800 : 100;
                this.speed = (type === 'ally' || type === 'player') ? 0.2 : 0.07;
            }
        }

        // --- ゲーム状態 ---
        const player = new Entity('player', 0, 0, 0xffeb3b);
        const allies = [
            new Entity('ally', -2, 2, 0x00bcd4),
            new Entity('ally', 2, 2, 0xe91e63)
        ];
        const enemies = [];
        const keys = {};
        let isBossBattle = false;

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- 技の処理 ---
        function executeSkill(id) {
            if (id === 1) { // 突進
                player.model.translateZ(4);
                enemies.forEach(e => {
                    if(e.model.position.distanceTo(player.model.position) < 4) e.hp -= 50;
                });
            }
            if (id === 2) { // 範囲攻撃
                const effect = new THREE.Mesh(new THREE.TorusGeometry(3, 0.2, 16, 32), new THREE.MeshBasicMaterial({color: 0x78c850}));
                effect.rotation.x = Math.PI/2;
                effect.position.copy(player.model.position);
                scene.add(effect);
                setTimeout(() => scene.remove(effect), 400);
                enemies.forEach(e => {
                    if(e.model.position.distanceTo(player.model.position) < 6) e.hp -= 30;
                });
            }
            if (id === 3) { // 爆発
                const blast = new THREE.Mesh(new THREE.SphereGeometry(5), new THREE.MeshBasicMaterial({color: 0xff4500, transparent: true, opacity: 0.6}));
                blast.position.copy(player.model.position);
                scene.add(blast);
                setTimeout(() => scene.remove(blast), 300);
                enemies.forEach(e => {
                    if(e.model.position.distanceTo(player.model.position) < 7) e.hp -= 100;
                });
            }
        }

        document.getElementById('skill1').addEventListener('click', () => executeSkill(1));
        document.getElementById('skill2').addEventListener('click', () => executeSkill(2));
        document.getElementById('skill3').addEventListener('click', () => executeSkill(3));

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            // プレイヤー移動
            if (keys['KeyW'] || keys['ArrowUp']) player.model.position.z -= player.speed;
            if (keys['KeyS'] || keys['ArrowDown']) player.model.position.z += player.speed;
            if (keys['KeyA'] || keys['ArrowLeft']) player.model.position.x -= player.speed;
            if (keys['KeyD'] || keys['ArrowRight']) player.model.position.x += player.speed;
            
            // ショートカットキー
            if (keys['KeyQ']) { executeSkill(1); keys['KeyQ'] = false; }
            if (keys['KeyE']) { executeSkill(2); keys['KeyE'] = false; }
            if (keys['KeyR']) { executeSkill(3); keys['KeyR'] = false; }

            // 仲間（超高速追従）
            allies.forEach(a => {
                const d = a.model.position.distanceTo(player.model.position);
                if(d > 2.5) {
                    a.model.lookAt(player.model.position);
                    a.model.translateZ(0.25);
                }
            });

            // 敵AI
            enemies.forEach((e, i) => {
                const dToP = e.model.position.distanceTo(player.model.position);
                e.model.lookAt(player.model.position);
                e.model.translateZ(e.speed);
                
                if(dToP < 1.5)
