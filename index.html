<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaku-Koro Quest: Beam & Recruit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #7cc47e; font-family: 'Courier New', sans-serif; }
        #ui {
            position: absolute; top: 15px; left: 15px; color: white;
            text-shadow: 2px 2px #333; pointer-events: none; z-index: 10;
        }
        .skill-container {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 20;
        }
        .skill-btn {
            width: 85px; height: 85px; border-radius: 12px; border: 4px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: bold; cursor: pointer; font-size: 10px;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2); position: relative;
        }
        /* スキルカラー */
        #btn-q { background: #ffeb3b; color: #333; } /* 10まんボルト */
        #btn-e { background: #8bc34a; }           /* はっぱカッター */
        #btn-r { background: #ce93d8; }           /* はかいこうせん */
        
        .cd-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.5);
            height: 0%; transition: height 0.1s linear; border-radius: 0 0 8px 8px;
        }
        #boss-warning {
            position: absolute; top: 25%; width: 100%; text-align: center;
            color: #fff; font-size: 45px; font-weight: bold; display: none;
            text-shadow: 0 0 15px #f44336; z-index: 30;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h1 style="margin:0; font-size: 28px;">KAKU-KORO QUEST</h1>
        <p style="font-size: 18px; margin: 5px 0;">探索距離: <span id="dist">0</span>m | チーム: <span id="count">3</span>匹</p>
        <p>HP: <progress id="hp-bar" value="100" max="100" style="width:250px; height:20px;"></progress></p>
    </div>

    <div id="boss-warning">⚠️ BOSS APPEARED ⚠️</div>

    <div class="skill-container">
        <div class="skill-btn" id="btn-q" onclick="useSkill(1)">10まんボルト<br>(Q)<div id="cd1" class="cd-overlay"></div></div>
        <div class="skill-btn" id="btn-e" onclick="useSkill(2)">はっぱカッター<br>(E)<div id="cd2" class="cd-overlay"></div></div>
        <div class="skill-btn" id="btn-r" onclick="useSkill(3)">はかいこうせん<br>(R)<div id="cd3" class="cd-overlay"></div></div>
    </div>

    <script>
        window.onload = () => {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa2e0a4);
            const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.3);
            sun.position.set(40, 60, 20);
            sun.castShadow = true;
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.7));

            // --- Environment ---
            const floorGroup = new THREE.Group();
            const floorTile = new THREE.PlaneGeometry(2, 2);
            for(let x=-15; x<15; x++) {
                for(let z=-100; z<20; z++) {
                    const color = (x + z) % 2 === 0 ? 0x7cc47e : 0x86cc88;
                    const tile = new THREE.Mesh(floorTile, new THREE.MeshStandardMaterial({color}));
                    tile.position.set(x*2, 0, z*2);
                    tile.rotation.x = -Math.PI / 2;
                    tile.receiveShadow = true;
                    floorGroup.add(tile);
                }
            }
            scene.add(floorGroup);

            function addObject(type, x, z) {
                const group = new THREE.Group();
                if(type === 'tree') {
                    const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.5, 0.8), new THREE.MeshStandardMaterial({color: 0x6d4c41}));
                    const leaf = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 2.5), new THREE.MeshStandardMaterial({color: 0x43a047}));
                    leaf.position.y = 2; group.add(trunk, leaf);
                } else {
                    const rock = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1, 1.5), new THREE.MeshStandardMaterial({color: 0x9e9e9e}));
                    group.add(rock);
                }
                group.position.set(x, 0.5, z);
                scene.add(group);
            }
            for(let i=0; i<60; i++) addObject(Math.random() > 0.5 ? 'tree' : 'rock', (Math.random()-0.5)*50, -i*15);

            // --- Entities ---
            const colors = [0xf44336, 0x2196f3, 0x9c27b0, 0xff9800, 0x00bcd4];
            
            class Entity {
                constructor(type, x, z, color) {
                    this.type = type;
                    this.mesh = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshStandardMaterial({color}));
                    body.castShadow = true; body.position.y = 0.6;
                    
                    const eye = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.1), new THREE.MeshStandardMaterial({color: 0x222222}));
                    eye.position.set(-0.35, 0.8, 0.61);
                    const eyeR = eye.clone(); eyeR.position.x = 0.35;
                    
                    this.mesh.add(body, eye, eyeR);
                    this.mesh.position.set(x, 0, z);
                    scene.add(this.mesh);

                    this.hp = type === 'boss' ? 1200 : 100;
                    this.maxHp = this.hp;
                    this.speed = (type === 'enemy') ? 0.08 : 0.22;
                    this.knockback = new THREE.Vector3();
                }
                
                update() {
                    this.mesh.position.add(this.knockback);
                    this.knockback.multiplyScalar(0.85);
                    // Jump Animation
                    if(this.isMoving || this.knockback.length() > 0.1) {
                        this.mesh.position.y = Math.abs(Math.sin(Date.now()*0.01)) * 0.4;
                    }
                }

                takeDamage(dmg, fromPos) {
                    this.hp -= dmg;
                    const dir = new THREE.Vector3().subVectors(this.mesh.position, fromPos).normalize();
                    this.knockback.addScaledVector(dir, 1.2);
                    if(this.hp <= 0) this.die();
                }

                die() {
                    if(this.type === 'enemy' && Math.random() < 0.25) { // 25%で仲間に！
                        const c = colors[Math.floor(Math.random()*colors.length)];
                        allies.push(new Entity('ally', this.mesh.position.x, this.mesh.position.z, c));
                        document.getElementById('count').innerText = allies.length + 1;
                    }
                    scene.remove(this.mesh);
                    this.dead = true;
                }
            }

            const player = new Entity('player', 0, 0, 0xffeb3b);
            const allies = [new Entity('ally', -2, 2, 0x4fc3f7), new Entity('ally', 2, 2, 0xff8a65)];
            const enemies = [];
            const particles = [];
            const keys = {};
            let cooldowns = [0, 0, 0];
            let isBoss = false;

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);

            // --- Skills ---
            window.useSkill = (id) => {
                if(cooldowns[id-1] > 0) return;
                cooldowns[id-1] = id === 3 ? 150 : 60; // ビームは長めのCD

                if(id === 1) { // 10まんボルト (周囲波状攻撃)
                    createFx(player.mesh.position, 0xffff00, 15);
                    enemies.forEach(e => { if(e.mesh.position.distanceTo(player.mesh.position) < 7) e.takeDamage(40, player.mesh.position); });
                } 
                else if(id === 2) { // はっぱカッター (前方扇形)
                    createFx(player.mesh.position, 0x4caf50, 10);
                    const forward = new THREE.Vector3(0,0,1).applyQuaternion(player.mesh.quaternion);
                    enemies.forEach(e => {
                        const toEnemy = new THREE.Vector3().subVectors(e.mesh.position, player.mesh.position);
                        if(toEnemy.length() < 10 && toEnemy.normalize().dot(forward) > 0.5) e.takeDamage(30, player.mesh.position);
                    });
                }
                else if(id === 3) { // はかいこうせん (直線ビーム)
                    const beamGeo = new THREE.BoxGeometry(2, 2, 20);
                    const beamMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.8});
                    const beam = new THREE.Mesh(beamGeo, beamMat);
                    beam.position.copy(player.mesh.position);
                    beam.quaternion.copy(player.mesh.quaternion);
                    beam.translateZ(10);
                    scene.add(beam);
                    setTimeout(() => scene.remove(beam), 300);

                    enemies.forEach(e => {
                        const localPos = e.mesh.position.clone().applyMatrix4(new THREE.Matrix4().copy(player.mesh.matrixWorld).invert());
                        if(Math.abs(localPos.x) < 2 && localPos.z > 0 && localPos.z < 20) e.takeDamage(120, player.mesh.position);
                    });
                }
            }

            function createFx(pos, color, count) {
                for(let i=0; i<count; i++) {
                    const p = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({color}));
                    p.position.copy(pos);
                    p.userData = { vel: new THREE.Vector3((Math.random()-0.5), Math.random(), (Math.random()-0.5)), life: 20 };
                    scene.add(p);
                    particles.push(p);
                }
            }

            // --- Main Loop ---
            function animate() {
                requestAnimationFrame(animate);

                // Player Move
                let move = new THREE.Vector3();
                if(keys['KeyW'] || keys['ArrowUp']) move.z -= 1;
                if(keys['KeyS'] || keys['ArrowDown']) move.z += 1;
                if(keys['KeyA'] || keys['ArrowLeft']) move.x -= 1;
                if(keys['KeyD'] || keys['ArrowRight']) move.x += 1;

                player.isMoving = move.length() > 0;
                if(player.isMoving) {
                    move.normalize();
                    player.mesh.position.addScaledVector(move, player.speed);
                    player.mesh.rotation.y = Math.atan2(move.x, move.z);
                }
                player.update();
                
                // Key Skills
                if(keys['KeyQ']) useSkill(1);
                if(keys['KeyE']) useSkill(2);
                if(keys['KeyR']) useSkill(3);

                // Allies
                allies.forEach(a => {
                    a.update();
                    const d = a.mesh.position.distanceTo(player.mesh.position);
                    if(d > 4) {
                        a.mesh.lookAt(player.mesh.position);
                        a.mesh.translateZ(0.25);
                        a.isMoving = true;
                    } else a.isMoving = false;
                });

                // Enemies
                if(!isBoss && enemies.length < 5 && Math.random() < 0.02) {
                    const c = colors[Math.floor(Math.random()*colors.length)];
                    enemies.push(new Entity('enemy', (Math.random()-0.5)*40, player.mesh.position.z - 50, c));
                }
                enemies.forEach((e, i) => {
                    e.update();
                    e.mesh.lookAt(player.mesh.position);
                    e.mesh.translateZ(e.speed);
                    if(e.mesh.position.distanceTo(player.mesh.position) < 1.5) player.hp -= 0.5;
                    if(e.dead) enemies.splice(i, 1);
                });

                // Particles
                for(let i=particles.length-1; i>=0; i--) {
                    const p = particles[i];
                    p.position.add(p.userData.vel);
                    p.userData.life--;
                    if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
                }

                // UI
                const d = Math.floor(Math.abs(player.mesh.position.z));
                document.getElementById('dist').innerText = d;
                document.getElementById('hp-bar').value = player.hp;
                cooldowns = cooldowns.map((v, i) => {
                    const nv = Math.max(0, v - 1);
                    document.getElementById(`cd${i+1}`).style.height = (nv / (i===2?150:60) * 100) + '%';
                    return nv;
                });

                // Boss
                if(d > 0 && d % 500 === 0 && !isBoss) {
                    isBoss = true;
                    enemies.push(new Entity('boss', 0, player.mesh.position.z - 50, 0x222222));
                    document.getElementById('boss-warning').style.display = 'block';
                    setTimeout(() => document.getElementById('boss-warning').style.display = 'none', 3000);
                } else if(isBoss && enemies.length === 0) isBoss = false;

                camera.position.set(player.mesh.position.x, 22, player.mesh.position.z + 22);
                camera.lookAt(player.mesh.position);
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
