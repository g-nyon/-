<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeVoxel Quest - DX Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial', sans-serif; touch-action: none; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            text-shadow: 2px 2px black; pointer-events: none; z-index: 10;
        }
        .skill-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 20;
        }
        .skill-btn {
            width: 75px; height: 75px; border-radius: 15px; border: 3px solid #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: bold; cursor: pointer; font-size: 11px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        #skill1 { background: #f08030; } /* 炎 */
        #skill2 { background: #78c850; } /* 草 */
        #skill3 { background: #42a5f5; } /* 水 */
        #boss-warning {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            color: #ff0000; font-size: 40px; font-weight: bold; display: none; 
            text-shadow: 4px 4px black; z-index: 15; text-align: center; width: 100%;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0; color: #ffcb05; -webkit-text-stroke: 1px #3b4cca;">VOXEL QUEST DX</h2>
        <p>距離: <span id="distance">0</span>m | 仲間: <span id="allyCount">2</span></p>
        <p>HP: <progress id="hp-bar" value="100" max="100" style="width:200px; height: 20px;"></progress></p>
    </div>

    <div id="boss-warning">⚠️ BOSS WARNING ⚠️</div>

    <div class="skill-container">
        <div class="skill-btn" id="btn-q">たいあたり<br>(Q)</div>
        <div class="skill-btn" id="btn-e">カッター<br>(E)</div>
        <div class="skill-btn" id="btn-r">ばくはつ<br>(R)</div>
    </div>

    <script>
        window.onload = () => {
            // --- Scene Setup ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(20, 40, 20);
            light.castShadow = true;
            scene.add(light, new THREE.AmbientLight(0xffffff, 0.7));

            // Ground
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x7cfc00 });
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 5000), floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // --- Effects Manager ---
            const particles = [];
            function createExplosion(pos, color, count = 10) {
                for (let i = 0; i < count; i++) {
                    const p = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.3), new THREE.MeshBasicMaterial({ color }));
                    p.position.copy(pos);
                    p.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.5, Math.random()*0.5, (Math.random()-0.5)*0.5);
                    p.userData.life = 30;
                    scene.add(p);
                    particles.push(p);
                }
            }

            // --- Character Factory ---
            function createCharMesh(color, isBoss = false) {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color }));
                body.position.y = 0.5;
                body.castShadow = true;
                group.add(body);

                // Ears (Flipped face direction to Z+)
                const earL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 0.2), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                earL.position.set(-0.4, 1.0, 0);
                group.add(earL);
                const earR = earL.clone(); earR.position.x = 0.4; group.add(earR);

                const eye = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.1), new THREE.MeshStandardMaterial({color: 0}));
                eye.position.set(-0.25, 0.7, 0.51); // Front face at Z+
                group.add(eye);
                const eyeR = eye.clone(); eyeR.position.x = 0.25; group.add(eyeR);

                if(isBoss) group.scale.set(4, 4, 4);
                return group;
            }

            // --- Entity Class ---
            class Entity {
                constructor(type, x, z, color) {
                    this.type = type;
                    this.model = createCharMesh(color || 0x888888, type === 'boss');
                    this.model.position.set(x, 0, z);
                    scene.add(this.model);
                    this.hp = type === 'boss' ? 1500 : 100;
                    this.speed = (type === 'player' || type === 'ally') ? 0.25 : 0.08;
                    this.knockback = new THREE.Vector3();
                    this.skillCooldown = 0;
                }

                takeDamage(dmg, sourcePos) {
                    this.hp -= dmg;
                    createExplosion(this.model.position, 0xff0000, 5);
                    // Knockback calculation
                    const dir = new THREE.Vector3().subVectors(this.model.position, sourcePos).normalize();
                    this.knockback.addScaledVector(dir, 1.5);
                }

                updatePhysics() {
                    this.model.position.add(this.knockback);
                    this.knockback.multiplyScalar(0.9); // Friction
                }
            }

            const player = new Entity('player', 0, 0, 0xffeb3b);
            const allies = [new Entity('ally', -2, 2, 0x00bcd4), new Entity('ally', 2, 2, 0xe91e63)];
            const enemies = [];
            const keys = {};
            let isBossBattle = false;

            // --- Input ---
            window.addEventListener('keydown', e => { keys[e.code] = true; });
            window.addEventListener('keyup', e => { keys[e.code] = false; });

            function useSkill(id, caster) {
                if(caster.skillCooldown > 0) return;
                caster.skillCooldown = 60; // 1秒程度のクールダウン

                if (id === 1) { // Dash
                    createExplosion(caster.model.position, 0xffffff, 5);
                    caster.model.translateZ(6);
                    checkHit(caster, 60, 4);
                } else if (id === 2) { // Cutter
                    createExplosion(caster.model.position, 0x78c850, 10);
                    checkHit(caster, 30, 7);
                } else if (id === 3) { // Blast
                    createExplosion(caster.model.position, 0xff4500, 20);
                    checkHit(caster, 100, 10);
                }
            }

            function checkHit(caster, dmg, range) {
                const targets = (caster.type === 'enemy' || caster.type === 'boss') ? [player, ...allies] : enemies;
                targets.forEach(t => {
                    if (t.model.position.distanceTo(caster.model.position) < range) {
                        t.takeDamage(dmg, caster.model.position);
                    }
                });
            }

            // Buttons
            document.getElementById('btn-q').onclick = () => useSkill(1, player);
            document.getElementById('btn-e').onclick = () => useSkill(2, player);
            document.getElementById('btn-r').onclick = () => useSkill(3, player);

            // --- Main Loop ---
            function animate() {
                requestAnimationFrame(animate);

                // Player Movement
                let moveDir = new THREE.Vector3(0, 0, 0);
                if (keys['KeyW'] || keys['ArrowUp']) moveDir.z -= 1;
                if (keys['KeyS'] || keys['ArrowDown']) moveDir.z += 1;
                if (keys['KeyA'] || keys['ArrowLeft']) moveDir.x -= 1;
                if (keys['KeyD'] || keys['ArrowRight']) moveDir.x += 1;

                if (moveDir.length() > 0) {
                    moveDir.normalize();
                    player.model.position.addScaledVector(moveDir, player.speed);
                    // Rotate to face direction
                    const angle = Math.atan2(moveDir.x, moveDir.z);
                    player.model.rotation.y = angle;
                }

                // Key Skills
                if(keys['KeyQ']) useSkill(1, player);
                if(keys['KeyE']) useSkill(2, player);
                if(keys['KeyR']) useSkill(3, player);

                // Particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.position.add(p.userData.vel);
                    p.userData.life--;
                    if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
                }

                // Allies Logic
                allies.forEach(a => {
                    a.updatePhysics();
                    const dToP = a.model.position.distanceTo(player.model.position);
                    if(dToP > 3) {
                        a.model.lookAt(player.model.position);
                        a.model.translateZ(0.26);
                    }
                    // Random Skill
                    if(Math.random() < 0.005) useSkill(Math.floor(Math.random()*3)+1, a);
                    if(a.skillCooldown > 0) a.skillCooldown--;
                });

                // Enemy Spawning & Logic
                if(!isBossBattle && enemies.length < 5 && Math.random() < 0.015) {
                    enemies.push(new Entity('enemy', (Math.random()-0.5)*40, player.model.position.z - 50, 0xff4444));
                }

                enemies.forEach((e, i) => {
                    e.updatePhysics();
                    e.model.lookAt(player.model.position);
                    e.model.translateZ(e.speed);
                    
                    if(e.model.position.distanceTo(player.model.position) < 1.5) player.takeDamage(0.5, e.model.position);
                    
                    if(e.hp <= 0) {
                        if(e.type === 'enemy' && Math.random() < 0.2) {
                            allies.push(new Entity('ally', e.model.position.x, e.model.position.z, 0xffffff));
                            document.getElementById('allyCount').innerText = allies.length;
                        }
                        scene.remove(e.model); enemies.splice(i, 1);
                        if(e.type === 'boss') { isBossBattle = false; document.getElementById('boss-warning').style.display = 'none'; }
                    }
                });

                // World State
                const dist = Math.floor(Math.abs(player.model.position.z));
                document.getElementById('distance').innerText = dist;
                document.getElementById('hp-bar').value = player.hp;
                if(player.skillCooldown > 0) player.skillCooldown--;

                // Boss
                if(dist > 0 && dist % 400 === 0 && !isBossBattle) {
                    isBossBattle = true;
                    enemies.push(new Entity('boss', 0, player.model.position.z - 50, 0x6a1b9a));
                    document.getElementById('boss-warning').style.display = 'block';
                }

                camera.position.set(player.model.position.x, 18, player.model.position.z + 20);
                camera.lookAt(player.model.position);
                
                // BG Color
                const hue = (dist % 1000) / 1000;
                scene.background.setHSL(hue, 0.5, 0.6);
                floorMat.color.setHSL(hue, 0.4, 0.4);

                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
